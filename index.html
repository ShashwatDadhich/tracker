<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>40-Day Accountability Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="auth-screen">
        <div class="auth-card">
          <p class="eyebrow">40-Day Accountability Challenge</p>
          <h1>Login first to continue.</h1>
          <p class="quote-label">Quote of the day</p>
          <p class="lede" id="dailyQuote"></p>

          <div class="auth-actions" role="group" aria-label="Login as a participant">
            <button class="auth-button" type="button" data-login-role="Kiran">Login as Kiran</button>
            <button class="auth-button" type="button" data-login-role="Shashwat">Login as Shashwat</button>
            <button class="auth-button auth-button--admin" type="button" data-login-role="Admin">Login as Admin</button>
          </div>

        </div>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
